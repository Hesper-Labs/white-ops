global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "whiteops-server"
    static_configs:
      - targets: ["server:8000"]
    metrics_path: /metrics

  - job_name: "whiteops-worker"
    static_configs:
      - targets: ["worker:9100"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
