services:
  # ---- Core Database ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whiteops}
      POSTGRES_USER: ${POSTGRES_USER:-whiteops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whiteops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    restart: unless-stopped

  # ---- Cache & Message Queue ----
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    restart: unless-stopped

  # ---- File Storage (S3-compatible) ----
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-whiteops}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    restart: unless-stopped

  # ---- Backend API Server ----
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whiteops}
      - POSTGRES_USER=${POSTGRES_USER:-whiteops}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-whiteops}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?err}
      - MINIO_BUCKET=${MINIO_BUCKET:-whiteops-files}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@whiteops.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - APP_ENV=${APP_ENV:-production}
      - VAULT_MASTER_KEY=${VAULT_MASTER_KEY:-}
      - MAIL_SERVER_HOST=mail
      - MAIL_SERVER_PORT=8025
      - MAIL_DOMAIN=${MAIL_DOMAIN:-whiteops.local}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${SERVER_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    restart: unless-stopped

  # ---- Agent Worker ----
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - MASTER_URL=http://server:8000
      - WORKER_NAME=${WORKER_NAME:-worker-01}
      - WORKER_MAX_AGENTS=${WORKER_MAX_AGENTS:-5}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-whiteops}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?err}
      - MINIO_BUCKET=${MINIO_BUCKET:-whiteops-files}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-anthropic}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-claude-sonnet-4-20250514}
      - MAIL_SERVER_HOST=mail
      - MAIL_SERVER_PORT=8025
      - MAIL_DOMAIN=${MAIL_DOMAIN:-whiteops.local}
    depends_on:
      - server
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped

  # ---- Celery Task Worker ----
  celery-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.services.task_queue.celery_app", "worker", "--loglevel=info", "-Q", "tasks,scheduled,whiteops", "--concurrency=4"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whiteops}
      - POSTGRES_USER=${POSTGRES_USER:-whiteops}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err}
      - SECRET_KEY=${SECRET_KEY:?err}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?err}
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  # ---- Celery Beat Scheduler ----
  celery-beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.services.task_queue.celery_app", "beat", "--loglevel=info"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whiteops}
      - POSTGRES_USER=${POSTGRES_USER:-whiteops}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err}
      - SECRET_KEY=${SECRET_KEY:?err}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?err}
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      - celery-worker
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # ---- Admin Panel (Frontend) ----
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped

  # ---- Internal Mail Server ----
  mail:
    build:
      context: ./mail
      dockerfile: Dockerfile
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN:-whiteops.local}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "8025:8025"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # ---- Monitoring (optional) ----
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0-alpine
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err}
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-whiteops}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-whiteops}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - redis-exporter
      - postgres-exporter
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
