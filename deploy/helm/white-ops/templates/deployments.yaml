metadata:
  name: {{ include "white-ops.fullname" . }}-mail
  labels:
    {{- include "white-ops.labels" . | nindent 4 }}
    app.kubernetes.io/component: mail
spec:
  replicas: {{ .Values.mail.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "white-ops.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mail
  template:
    metadata:
      labels:
        {{- include "white-ops.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ include "white-ops.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mail
    spec:
      serviceAccountName: {{ include "white-ops.fullname" . }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: mail
          image: "{{ .Values.mail.image.repository }}:{{ .Values.mail.image.tag }}"
          imagePullPolicy: {{ .Values.mail.image.pullPolicy }}
          ports:
            - name: smtp
              containerPort: 8025
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "white-ops.fullname" . }}-config
