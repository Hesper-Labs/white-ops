## Global settings
global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ghcr.io

## Server (FastAPI backend)
server:
  image:
    repository: ghcr.io/white-ops/server
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
  env:
    POSTGRES_HOST: "{{ .Release.Name }}-postgres"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: whiteops
    REDIS_HOST: "{{ .Release.Name }}-redis"
    REDIS_PORT: "6379"
  service:
    type: ClusterIP
    port: 8000

## Worker (Agent worker)
worker:
  image:
    repository: ghcr.io/white-ops/worker
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilization: 60

## Web (Nginx frontend)
web:
  image:
    repository: ghcr.io/white-ops/web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Celery Worker
celeryWorker:
  image:
    repository: ghcr.io/white-ops/server
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

## Celery Beat
celeryBeat:
  image:
    repository: ghcr.io/white-ops/server
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Mail service
mail:
  image:
    repository: ghcr.io/white-ops/mail
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  host: whiteops.example.com
  tls:
    enabled: true
    secretName: whiteops-tls

## PostgreSQL (sub-chart or external)
postgres:
  enabled: true
  image: postgres:16-alpine
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  auth:
    database: whiteops
    username: whiteops
    existingSecret: whiteops-postgres-secret
    secretKey: password

## Redis
redis:
  enabled: true
  image: redis:7-alpine
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  auth:
    existingSecret: whiteops-redis-secret
    secretKey: password

## MinIO (S3-compatible storage)
minio:
  enabled: true
  image: minio/minio:latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  auth:
    existingSecret: whiteops-minio-secret

## Network Policy
networkPolicy:
  enabled: true
