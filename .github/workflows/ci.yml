name: White-Ops CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npx tsc --noEmit

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: cd server && ruff check app/
      - run: cd worker && ruff check agent/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node dependency audit
        run: cd web && npm ci && npm audit --audit-level=critical
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whiteops_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpassword123
        ports: ['5432:5432']
        options: --health-cmd "pg_isready" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd server && pip install ".[dev]"
      - run: cd server && python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          APP_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: whiteops_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpassword123
          REDIS_HOST: localhost
          REDIS_PASSWORD: ''
          JWT_SECRET_KEY: test-secret-key-min-32-characters-long
          SECRET_KEY: test-secret-key-min-32-characters-long-too
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: server/test-results.xml

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npx vitest run

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [server, worker, web, mail]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/hesper-labs/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/hesper-labs/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
