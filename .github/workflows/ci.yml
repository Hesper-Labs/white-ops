name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check-frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd web && npm ci
      - name: TypeScript check
        run: cd web && npx tsc --noEmit

  check-python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check syntax (server)
        run: python -m py_compile server/app/main.py && echo "Server syntax OK"
      - name: Check all Python files
        run: |
          errors=0
          for f in $(find server worker -name "*.py"); do
            python -c "import ast; ast.parse(open('$f').read())" 2>/dev/null || { echo "FAIL: $f"; errors=$((errors+1)); }
          done
          echo "Checked $(find server worker -name '*.py' | wc -l) files, $errors errors"
          [ $errors -eq 0 ]

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check-frontend, check-python-syntax]
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -t whiteops-server ./server
      - name: Build worker image
        run: docker build -t whiteops-worker ./worker
      - name: Build web image
        run: docker build -t whiteops-web ./web
      - name: Build mail image
        run: docker build -t whiteops-mail ./mail
